name: 🚀 Deploy to Timeweb with HTTPS

on:
  push:
    branches: [ main ]

env:
  DOCKER_IMAGE: ghcr.io/${{ github.repository }}:timeweb-latest
  PROJECT_PATH: /opt/insflow-system
  SSL_EMAIL: admin@insflow.ru
  DOMAINS_PRIMARY: insflow.ru,zs.insflow.ru
  DOMAINS_TECHNICAL: insflow.tw1.su,zs.insflow.tw1.su

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    # 1️⃣ Клонируем код
    - name: Checkout code
      uses: actions/checkout@v4

    # 2️⃣ Настраиваем buildx (для кэшируемых multi-arch сборок)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 3️⃣ Логинимся в GitHub Container Registry
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # 4️⃣ Сборка и пуш образа с кэшем (отдельный тег для Timeweb)
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ env.DOCKER_IMAGE }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    # 5️⃣ Деплой на Timeweb через SSH
    - name: Deploy to Timeweb
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.TIMEWEB_HOST }}
        username: ${{ secrets.TIMEWEB_USERNAME }}
        key: ${{ secrets.TIMEWEB_SSH_KEY }}
        port: ${{ secrets.TIMEWEB_PORT }}
        script: |
          set -e  # остановить выполнение при любой ошибке
          
          echo "➡️ Переходим в проект..."
          cd ${{ env.PROJECT_PATH }}
          
          echo "➡️ Проверяем, есть ли обновления в репозитории..."
          git fetch origin main
          git reset --hard origin/main
          
          echo "➡️ Обновляем .env..."
          cat > .env << EOF
          SECRET_KEY=${{ secrets.TIMEWEB_SECRET_KEY }}
          DB_NAME=${{ secrets.TIMEWEB_DB_NAME }}
          DB_USER=${{ secrets.TIMEWEB_DB_USER }}
          DB_PASSWORD=${{ secrets.TIMEWEB_DB_PASSWORD }}
          DB_HOST=db
          DB_PORT=5432
          DB_ENGINE=django.db.backends.postgresql
          ALLOWED_HOSTS=${{ secrets.TIMEWEB_ALLOWED_HOSTS }}
          DOCKER_IMAGE=${{ env.DOCKER_IMAGE }}
          
          # Security settings for production (HTTPS enabled)
          DEBUG=False
          SESSION_COOKIE_SECURE=True
          CSRF_COOKIE_SECURE=True
          SECURE_HSTS_SECONDS=31536000
          SECURE_HSTS_INCLUDE_SUBDOMAINS=True
          SECURE_HSTS_PRELOAD=True
          SECURE_SSL_REDIRECT=True

          # Login security settings (anti-bruteforce / anti-enumeration)
          LOGIN_RATE_LIMIT_ENABLED=True
          LOGIN_MAX_ATTEMPTS=5
          LOGIN_MAX_ATTEMPTS_PER_IP=20
          LOGIN_ATTEMPT_WINDOW_SECONDS=900
          LOGIN_LOCKOUT_SECONDS=900
          LOGIN_RATE_LIMIT_TRUST_X_FORWARDED_FOR=True
          
          # Domain-specific settings for landing page
          MAIN_DOMAINS=${{ secrets.TIMEWEB_MAIN_DOMAINS }}
          SUBDOMAINS=${{ secrets.TIMEWEB_SUBDOMAINS }}
          
          # Static files configuration
          STATIC_URL=/static/
          MEDIA_URL=/media/
          
          # SSL Certificate settings
          SSL_ENABLED=True
          SSL_EMAIL=${{ env.SSL_EMAIL }}

          # VK backup delivery (daily pg_dump → VK community → user DM)
          VK_BACKUP_TOKEN=${{ secrets.VK_BACKUP_TOKEN }}
          VK_BACKUP_PEER_ID=${{ secrets.VK_BACKUP_PEER_ID }}
          VK_API_VERSION=5.199
          EOF
          
          echo "➡️ Логинимся в GitHub Container Registry..."
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          echo "➡️ Логинимся в Docker Hub для избежания rate limit..."
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
            echo "✅ Docker Hub login успешен"
          else
            echo "⚠️ Docker Hub credentials не настроены, возможны rate limit ошибки"
          fi
          
          echo "➡️ Загружаем новый Docker-образ..."
          docker pull ${{ env.DOCKER_IMAGE }}
          
          echo "➡️ Предварительно загружаем базовые образы..."
          docker pull postgres:15 || echo "⚠️ Не удалось загрузить postgres:15"
          docker pull nginx:1.25-alpine || echo "⚠️ Не удалось загрузить nginx:1.25-alpine"
          
          echo "➡️ Проверяем и устанавливаем SSL сертификаты..."
          
          # Function to enable fallback mode
          enable_fallback_mode() {
            echo "❌ Переключаемся в fallback режим (HTTP-only)"
            
            # Update .env to disable HTTPS features
            sed -i 's/SESSION_COOKIE_SECURE=True/SESSION_COOKIE_SECURE=False/' .env
            sed -i 's/CSRF_COOKIE_SECURE=True/CSRF_COOKIE_SECURE=False/' .env
            sed -i 's/SECURE_SSL_REDIRECT=True/SECURE_SSL_REDIRECT=False/' .env
            sed -i 's/SECURE_HSTS_SECONDS=31536000/SECURE_HSTS_SECONDS=0/' .env
            sed -i 's/SECURE_HSTS_INCLUDE_SUBDOMAINS=True/SECURE_HSTS_INCLUDE_SUBDOMAINS=False/' .env
            sed -i 's/SECURE_HSTS_PRELOAD=True/SECURE_HSTS_PRELOAD=False/' .env
            sed -i 's/SSL_ENABLED=True/SSL_ENABLED=False/' .env
            
            echo "⚠️ Развертывание продолжится в HTTP-only режиме"
          }
          
          # Make SSL scripts executable
          chmod +x scripts/ssl/*.sh || {
            echo "❌ Не удалось сделать SSL скрипты исполняемыми"
            enable_fallback_mode
          }
          
          # Check DNS resolution for domains first
          echo "➡️ Проверяем DNS разрешение доменов..."
          dns_check_failed=false
          
          for domain_set in "${{ env.DOMAINS_PRIMARY }}" "${{ env.DOMAINS_TECHNICAL }}"; do
            IFS=',' read -ra domains <<< "$domain_set"
            for domain in "${domains[@]}"; do
              if ! nslookup "$domain" > /dev/null 2>&1; then
                echo "❌ DNS разрешение не удалось для $domain"
                dns_check_failed=true
              else
                echo "✅ DNS разрешение OK для $domain"
              fi
            done
          done
          
          if [ "$dns_check_failed" = true ]; then
            echo "❌ DNS проверка не прошла для некоторых доменов"
            enable_fallback_mode
          else
            echo "✅ DNS проверка прошла успешно для всех доменов"
            
            # Check if certificates already exist and are valid
            if scripts/ssl/check-certificates.sh --quiet 2>/dev/null; then
              echo "✅ SSL сертификаты уже существуют и действительны"
            else
              echo "⚠️ SSL сертификаты отсутствуют или требуют обновления"
              
              # Try to obtain certificates with Docker-based approach
              echo "➡️ Попытка получения SSL сертификатов через Docker..."
              chmod +x scripts/ssl/obtain-certificates-docker.sh
              if timeout 600 bash scripts/ssl/obtain-certificates-docker.sh 2>&1 | tee ssl-generation.log; then
                echo "✅ SSL сертификаты успешно получены"
                
                # Verify certificates were actually created
                echo "🔍 Проверяем созданные сертификаты..."
                sleep 3  # Wait for file system sync
                
                # Check with sudo if regular check fails (permission issue)
                if [[ -f "letsencrypt/live/insflow.ru/fullchain.pem" ]] && [[ -f "letsencrypt/live/insflow.tw1.su/fullchain.pem" ]]; then
                  echo "✅ SSL сертификаты проверены и готовы к использованию"
                  
                  # Show certificate info
                  echo "📋 Информация о сертификатах:"
                  ls -la letsencrypt/live/*/fullchain.pem 2>/dev/null || echo "Не удалось показать информацию о файлах"
                # Try multiple ways to check for certificates
                elif [[ -f "letsencrypt/live/insflow.ru/fullchain.pem" ]] || [[ -f "letsencrypt/live/insflow.tw1.su/fullchain.pem" ]] || \
                     [[ -d "letsencrypt/live/insflow.ru" ]] || [[ -d "letsencrypt/live/insflow.tw1.su" ]] || \
                     docker run --rm -v "$(pwd)/letsencrypt:/etc/letsencrypt" certbot/certbot:latest certificates 2>/dev/null | grep -q "insflow"; then
                  echo "✅ SSL сертификаты найдены"
                  echo "🔧 Активируем HTTPS конфигурацию..."
                  
                  echo "Обновляем .env для HTTPS..."
                  sed -i 's/SSL_ENABLED=False/SSL_ENABLED=True/' .env
                  sed -i 's/SESSION_COOKIE_SECURE=False/SESSION_COOKIE_SECURE=True/' .env
                  sed -i 's/CSRF_COOKIE_SECURE=False/CSRF_COOKIE_SECURE=True/' .env
                  sed -i 's/SECURE_SSL_REDIRECT=False/SECURE_SSL_REDIRECT=True/' .env
                  sed -i 's/SECURE_HSTS_SECONDS=0/SECURE_HSTS_SECONDS=31536000/' .env
                  sed -i 's/SECURE_HSTS_INCLUDE_SUBDOMAINS=False/SECURE_HSTS_INCLUDE_SUBDOMAINS=True/' .env
                  sed -i 's/SECURE_HSTS_PRELOAD=False/SECURE_HSTS_PRELOAD=True/' .env
                  
                  echo "✅ HTTPS конфигурация активирована!"
                else
                  echo "❌ SSL сертификаты получены, но файлы не найдены в ожидаемом месте"
                  echo "🔍 Проверяем содержимое letsencrypt директории:"
                  sudo ls -la letsencrypt/live/ 2>/dev/null || echo "Директория letsencrypt/live не найдена"
                  echo "📋 Логи генерации сертификатов:"
                  cat ssl-generation.log || echo "Логи недоступны"
                  enable_fallback_mode
                fi
              else
                echo "❌ Не удалось получить SSL сертификаты (timeout или ошибка)"
                echo "📋 Логи генерации сертификатов:"
                cat ssl-generation.log || echo "Логи недоступны"
                enable_fallback_mode
              fi
            fi
          fi
          
          # Show final SSL status
          if grep -q "SSL_ENABLED=True" .env; then
            echo "✅ SSL включен - развертывание будет использовать HTTPS"
          else
            echo "⚠️ SSL отключен - развертывание будет использовать HTTP-only режим"
          fi
          
          echo "➡️ Настраиваем nginx конфигурацию..."
          if grep -q "SSL_ENABLED=True" .env; then
            echo "🔒 Используем HTTPS конфигурацию nginx (default.conf уже содержит HTTPS)"
            # default.conf already contains HTTPS configuration
            COMPOSE_PROFILES="ssl"
          else
            echo "🔓 Используем HTTP-only конфигурацию nginx"
            # Fallback: copy HTTP-only config if SSL is disabled
            cp nginx-timeweb/default-acme.conf nginx-timeweb/default.conf
            COMPOSE_PROFILES=""
          fi
          
          echo "📋 Финальная конфигурация:"
          echo "SSL_ENABLED: $(grep SSL_ENABLED .env)"
          echo "COMPOSE_PROFILES: $COMPOSE_PROFILES"
          
          echo "➡️ Перезапускаем docker-compose..."
          docker-compose -f docker-compose.yml down --remove-orphans
          COMPOSE_PROFILES="$COMPOSE_PROFILES" docker-compose -f docker-compose.yml up -d --force-recreate
          
          echo "➡️ Ожидаем запуска сервисов..."
          sleep 30
          
          echo "➡️ Проверяем статус контейнеров..."
          docker-compose -f docker-compose.yml ps
          
          echo "➡️ Проверяем логи web контейнера..."
          docker-compose -f docker-compose.yml logs --tail=50 web
          
          echo "➡️ Чиним права на /app/backups (named volume по умолчанию создаётся под root)..."
          docker-compose -f docker-compose.yml exec -T -u 0 web chown -R app:app /app/backups || \
            echo "⚠️ Не удалось chown /app/backups (продолжаем)"

          echo "➡️ Создаём бекап БД перед миграциями..."
          mkdir -p backups
          if docker-compose -f docker-compose.yml exec -T web python manage.py backup_db --format pgdump --output-dir /app/backups --keep 10; then
            echo "✅ pg_dump бекап создан"
          else
            echo "⚠️ pg_dump не удался, делаем JSON бекап..."
            docker-compose -f docker-compose.yml exec -T web python manage.py backup_db --format json --output-dir /app/backups --keep 10 || echo "⚠️ JSON бекап тоже не удался, продолжаем деплой"
          fi

          echo "➡️ Применяем миграции БД..."
          if docker-compose -f docker-compose.yml exec -T web python manage.py migrate --noinput; then
            echo "✅ Миграции применены успешно"
          else
            echo "❌ Ошибка при применении миграций, показываем логи:"
            docker-compose -f docker-compose.yml logs --tail=100 web
            docker-compose -f docker-compose.yml logs --tail=50 db
            exit 1
          fi
          
          echo "➡️ Собираем статические файлы..."
          if docker-compose -f docker-compose.yml exec -T web python manage.py collectstatic --noinput; then
            echo "✅ Статические файлы собраны успешно"
          else
            echo "❌ Ошибка при сборе статических файлов"
            docker-compose -f docker-compose.yml logs --tail=50 web
            exit 1
          fi

          echo "➡️ Настраиваем cron для ежедневной отправки бэкапа в VK..."
          if [ -n "${{ secrets.VK_BACKUP_TOKEN }}" ] && [ -n "${{ secrets.VK_BACKUP_PEER_ID }}" ]; then
            chmod +x scripts/backup-cron-setup.sh
            if bash scripts/backup-cron-setup.sh; then
              echo "✅ Cron задача для бэкапа в VK установлена"
            else
              echo "⚠️ Не удалось установить cron задачу для бэкапа в VK"
            fi
          else
            echo "⚠️ VK_BACKUP_TOKEN/VK_BACKUP_PEER_ID не заданы — пропускаем установку cron"
          fi
          
          echo "➡️ Проверяем состояние контейнеров..."
          docker-compose -f docker-compose.yml ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          
          echo "➡️ Проверяем healthcheck..."
          # Try multiple health check approaches for HTTPS deployments
          if docker-compose -f docker-compose.yml exec -T web python /app/simple_healthcheck.py; then
            echo "✅ Healthcheck прошел успешно!"
          elif docker-compose -f docker-compose.yml exec -T web curl -f -s http://localhost:8000/healthz/ > /dev/null 2>&1; then
            echo "✅ Healthcheck прошел успешно (через curl)!"
          elif docker-compose -f docker-compose.yml exec -T web python -c "import urllib.request; response = urllib.request.urlopen('http://localhost:8000/healthz/', timeout=5); print('✅ Healthcheck прошел успешно (через Python)!')"; then
            echo "✅ Healthcheck прошел успешно!"
          else
            echo "⚠️ Healthcheck не прошел, но продолжаем deployment"
            echo "🔍 Проверяем логи web контейнера для диагностики..."
            docker-compose -f docker-compose.yml logs --tail=10 web
          fi
          
          echo "➡️ Ожидаем готовности nginx..."
          # Wait for nginx to be ready
          for i in {1..30}; do
            if docker-compose -f docker-compose.yml ps nginx | grep -q "Up"; then
              echo "✅ Nginx готов!"
              break
            fi
            echo "⏳ Ожидаем nginx... ($i/30)"
            sleep 2
          done
          
          echo "➡️ Тестируем основные endpoints..."
          # Test HTTP endpoints (should redirect to HTTPS if SSL is enabled)
          if curl -f -s http://localhost/healthz/ > /dev/null; then
            echo "✅ Health endpoint работает!"
          else
            echo "❌ Health endpoint недоступен!"
            echo "🔍 Проверяем логи nginx..."
            docker-compose -f docker-compose.yml logs --tail=20 nginx
          fi
          
          # Test HTTPS endpoints if SSL is enabled
          if grep -q "SSL_ENABLED=True" .env; then
            echo "➡️ Тестируем HTTPS endpoints..."
            
            # Wait for SSL to be ready
            sleep 10
            
            # Test HTTPS health endpoint
            if curl -f -s -k https://localhost/healthz/ > /dev/null; then
              echo "✅ HTTPS Health endpoint работает!"
            else
              echo "❌ HTTPS Health endpoint недоступен!"
            fi
            
            # Test HTTPS landing page
            if curl -f -s -k https://localhost/landing/health/ > /dev/null; then
              echo "✅ HTTPS Landing page health endpoint работает!"
            else
              echo "❌ HTTPS Landing page health endpoint недоступен!"
            fi
            
            # Test HTTPS static files
            if curl -f -s -k https://localhost/static/css/landing.css > /dev/null; then
              echo "✅ HTTPS Landing CSS файл доступен!"
            else
              echo "❌ HTTPS Landing CSS файл недоступен!"
            fi
            
            # Test HTTP to HTTPS redirect
            if curl -s -o /dev/null -w "%{http_code}" http://localhost/healthz/ | grep -q "301\|302"; then
              echo "✅ HTTP to HTTPS redirect работает!"
            else
              echo "⚠️ HTTP to HTTPS redirect может не работать корректно"
            fi
          else
            echo "⚠️ SSL отключен, пропускаем HTTPS тесты"
          fi
          
          echo "➡️ Тестируем лендинг-страницу..."
          if curl -f -s http://localhost/landing/health/ > /dev/null; then
            echo "✅ Landing page health endpoint работает!"
          else
            echo "❌ Landing page health endpoint недоступен!"
            echo "🔍 Проверяем доступность основной страницы..."
            curl -I http://localhost/landing/ || echo "Лендинг страница недоступна"
          fi
          
          echo "➡️ Проверяем статические файлы лендинг-страницы..."
          if curl -f -s http://localhost/static/css/landing.css > /dev/null; then
            echo "✅ Landing CSS файл доступен!"
          else
            echo "❌ Landing CSS файл недоступен!"
            echo "🔍 Проверяем статические файлы..."
            ls -la staticfiles/css/ || echo "Статические файлы не найдены"
          fi
          
          echo "➡️ Запускаем верификацию лендинг-страницы..."
          if docker-compose -f docker-compose.yml exec -T web bash /app/scripts/verify_landing_deployment.sh; then
            echo "✅ Верификация лендинг-страницы прошла успешно!"
          else
            echo "⚠️ Верификация лендинг-страницы показала предупреждения (это нормально для продакшена)"
          fi
          
          echo "➡️ Проверяем SSL сертификаты после развертывания..."
          if grep -q "SSL_ENABLED=True" .env; then
            if scripts/ssl/check-certificates.sh; then
              echo "✅ SSL сертификаты проверены и действительны!"
            else
              echo "⚠️ Обнаружены проблемы с SSL сертификатами"
            fi
            
            echo "➡️ Настраиваем автоматическое обновление сертификатов..."
            if scripts/ssl/ssl-cron-setup.sh; then
              echo "✅ Cron задача для обновления сертификатов настроена!"
            else
              echo "⚠️ Не удалось настроить автоматическое обновление сертификатов"
            fi
          else
            echo "⚠️ SSL отключен, пропускаем проверку сертификатов"
          fi
          
          echo "➡️ Финальная проверка HTTPS функциональности..."
          if grep -q "SSL_ENABLED=True" .env; then
            # Test all domains if accessible
            for domain in ${{ env.DOMAINS_PRIMARY }} ${{ env.DOMAINS_TECHNICAL }}; do
              domain=$(echo $domain | tr ',' ' ')
              for d in $domain; do
                echo "Тестируем домен: $d"
                # Note: This will only work if domains are properly configured and accessible
                if timeout 10 curl -f -s -I "https://$d/healthz/" > /dev/null 2>&1; then
                  echo "✅ HTTPS работает для $d"
                else
                  echo "⚠️ HTTPS недоступен для $d (возможно, DNS еще не настроен)"
                fi
              done
            done
          fi
          
          echo "➡️ Чистим неиспользуемые образы..."
          docker image prune -f
          
          echo "➡️ Создаем отчет о развертывании..."
          cat > deployment_report.txt << EOF
          ===== TIMEWEB DEPLOYMENT REPORT =====
          Deployment Time: $(date)
          Git Commit: ${{ github.sha }}
          Docker Image: ${{ env.DOCKER_IMAGE }}
          
          SSL Status: $(grep "SSL_ENABLED=" .env | cut -d= -f2)
          HTTPS Redirect: $(grep "SECURE_SSL_REDIRECT=" .env | cut -d= -f2)
          
          Configured Domains:
          - Primary: ${{ env.DOMAINS_PRIMARY }}
          - Technical: ${{ env.DOMAINS_TECHNICAL }}
          
          Container Status:
          $(docker-compose -f docker-compose.yml ps --format "table {{.Names}}\t{{.Status}}")
          
          SSL Certificate Status:
          EOF
          
          if grep -q "SSL_ENABLED=True" .env; then
            scripts/ssl/check-certificates.sh --quiet >> deployment_report.txt 2>&1 || echo "Certificate check failed" >> deployment_report.txt
          else
            echo "SSL disabled - no certificates to check" >> deployment_report.txt
          fi
          
          echo "EOF" >> deployment_report.txt
          
          echo "➡️ Отчет о развертывании:"
          cat deployment_report.txt
          
          if grep -q "SSL_ENABLED=True" .env; then
            echo "✅ Деплой на Timeweb с HTTPS и лендинг-страницей успешно завершён!"
            echo "🔒 HTTPS активен для всех доменов"
            echo "📋 Автоматическое обновление сертификатов настроено"
          else
            echo "⚠️ Деплой на Timeweb завершён в fallback режиме (без HTTPS)"
            echo "🔓 Система работает в HTTP-only режиме"
            echo "📋 Для включения HTTPS необходимо настроить DNS и повторить развертывание"
          fi
          
          echo ""
          echo "🌐 Доступные endpoints:"
          if grep -q "SSL_ENABLED=True" .env; then
            echo "  - https://insflow.ru (лендинг-страница)"
            echo "  - https://zs.insflow.ru (Django приложение)"
            echo "  - https://insflow.tw1.su (лендинг-страница, зеркало)"
            echo "  - https://zs.insflow.tw1.su (Django приложение, зеркало)"
          else
            echo "  - http://insflow.tw1.su (лендинг-страница)"
            echo "  - http://zs.insflow.tw1.su (Django приложение)"
          fi

    # 6️⃣ Post-deployment notification and cleanup
    - name: Post-deployment notification
      if: always()
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.TIMEWEB_HOST }}
        username: ${{ secrets.TIMEWEB_USERNAME }}
        key: ${{ secrets.TIMEWEB_SSH_KEY }}
        port: ${{ secrets.TIMEWEB_PORT }}
        script: |
          cd ${{ env.PROJECT_PATH }}
          
          # Check final deployment status
          if docker-compose -f docker-compose.yml ps | grep -q "Up"; then
            deployment_status="SUCCESS"
          else
            deployment_status="FAILED"
          fi
          
          ssl_status=$(grep "SSL_ENABLED=" .env | cut -d= -f2)
          
          echo "📊 Final Deployment Status: $deployment_status"
          echo "🔒 SSL Status: $ssl_status"
          
          # Log deployment event
          echo "$(date '+%Y-%m-%d %H:%M:%S') - Deployment $deployment_status (SSL: $ssl_status)" >> /var/log/deployment.log
          
          # Optional: Send notification (webhook, email, etc.)
          # This can be extended to send notifications to external services
          if [ "$deployment_status" = "FAILED" ]; then
            echo "❌ Deployment failed - manual intervention may be required"
            exit 1
          else
            echo "✅ Deployment completed successfully"
          fi
